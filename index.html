<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>INTERRUPT — System Visibility</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0A0A0A;
  color:#EAEAEA;
}

.container {
  max-width:700px;
  margin:auto;
  padding:24px;
}

h1 { font-size:28px; }
h2 { margin-top:20px; }

.progress {
  height:6px;
  background:#1a1a1a;
  margin:20px 0;
  border-radius:4px;
}
.progress-bar {
  height:6px;
  background:#EAEAEA;
  width:0%;
}

.section {
  margin-top:20px;
  padding:20px;
  border:1px solid #2A2A2A;
  border-radius:8px;
}

input, textarea, select {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:transparent;
  border:1px solid #2A2A2A;
  color:#EAEAEA;
}

button {
  margin-top:14px;
  padding:14px;
  width:100%;
  background:#111;
  border:1px solid #2A2A2A;
  color:#EAEAEA;
  cursor:pointer;
}

button:hover { background:#151515; }

.hidden { display:none; }

.output {
  white-space:pre-wrap;
  background:#111;
  padding:16px;
  margin-top:16px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>INTERRUPT</h1>
<p>You are not stuck. You are operating inside a system.</p>

<div class="progress">
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- SECTION 1 -->
<div class="section" id="section1">
<h2>Structure</h2>

<select id="domain">
<option value="">Select domain</option>
<option>Roles</option>
<option>Environment</option>
<option>Routine</option>
<option>Pressure</option>
</select>

<textarea id="structure" placeholder="What is happening?"></textarea>
<textarea id="pattern" placeholder="What repeats?"></textarea>

<input id="email" placeholder="Your email">

<button onclick="saveSection1()">Continue</button>
</div>

<!-- SECTION 2 -->
<div class="section hidden" id="section2">
<h2>Structural Tension</h2>

<textarea id="tension" placeholder="Where is the conflict?"></textarea>
<textarea id="cost" placeholder="What is the cost?"></textarea>

<button onclick="saveSection2()">Generate Snapshot</button>
</div>

<!-- OUTPUT -->
<div class="section hidden" id="outputSection">
<h2>System Snapshot</h2>

<div class="output" id="output"></div>

<h3 style="margin-top:30px;">What will you change first?</h3>
<input id="firstMove" placeholder="Define one structural change">

<h3 style="margin-top:20px;">Select move type</h3>
<button onclick="selectMove('environment')">Adjust environment</button>
<button onclick="selectMove('reduce')">Reduce one demand</button>
<button onclick="selectMove('remove')">Remove one pressure</button>

<div id="selectedMove" style="margin-top:10px; opacity:0.6;"></div>

<button onclick="finalise()">Lock First Move</button>

<div id="finalBlock" class="hidden">

<div class="output" id="finalOutput"></div>

<p style="margin-top:20px; opacity:0.6;">
This will repeat. When it does, run this again.
</p>

<button onclick="sendReport()">Send Report</button>

<button onclick="goNext()">Stabilise Next →</button>

<button onclick="reset()">Start Again</button>

</div>
</div>

</div>

<script>
let state = JSON.parse(localStorage.getItem("interrupt")) || {};
let selectedMoveType = "";

function updateProgress(p){
  document.getElementById("progressBar").style.width = p + "%";
}

function saveSection1(){
  state.domain = document.getElementById("domain").value;
  state.structure = document.getElementById("structure").value;
  state.pattern = document.getElementById("pattern").value;
  state.email = document.getElementById("email").value;

  localStorage.setItem("interrupt", JSON.stringify(state));

  document.getElementById("section1").classList.add("hidden");
  document.getElementById("section2").classList.remove("hidden");

  updateProgress(50);
}

function saveSection2(){
  state.tension = document.getElementById("tension").value;
  state.cost = document.getElementById("cost").value;

  localStorage.setItem("interrupt", JSON.stringify(state));

  generateOutput();
  updateProgress(80);
}

function generateOutput(){
  const out = `
SYSTEM SNAPSHOT

Domain: ${state.domain}

Structure:
${state.structure}

Pattern:
${state.pattern}

Tension:
${state.tension}

Cost:
${state.cost}

Insight:
This is not a personal failure.
This is a structural condition.
`;

  document.getElementById("output").innerText = out;

  document.getElementById("section2").classList.add("hidden");
  document.getElementById("outputSection").classList.remove("hidden");
}

function selectMove(type){
  selectedMoveType = type;

  const labels = {
    environment: "Adjust environment",
    reduce: "Reduce one demand",
    remove: "Remove one pressure"
  };

  document.getElementById("selectedMove").innerText =
    "Selected: " + labels[type];
}

function finalise(){
  const move = document.getElementById("firstMove").value;

  if(!move || !selectedMoveType){
    alert("Define your first move and select a type");
    return;
  }

  state.firstMove = move;
  state.moveType = selectedMoveType;

  localStorage.setItem("interrupt", JSON.stringify(state));

  const extended = `
SYSTEM SNAPSHOT

Domain: ${state.domain}

Structure:
${state.structure}

Pattern:
${state.pattern}

Tension:
${state.tension}

Cost:
${state.cost}

Insight:
This is not a personal failure.
This is a structural condition.

---

FIRST MOVE:
${state.firstMove}

TYPE:
${state.moveType}
`;

  document.getElementById("finalOutput").innerText = extended;
  document.getElementById("finalBlock").classList.remove("hidden");

  updateProgress(100);
}

async function sendReport(){
  const formData = new FormData();

  formData.append("email", state.email);
  formData.append("report", document.getElementById("finalOutput").innerText);

  await fetch("https://formspree.io/f/YOUR_FORMSPREE_ID", {
    method: "POST",
    body: formData,
    headers: { 'Accept': 'application/json' }
  });

  alert("Report sent");
}

function goNext(){
  alert("Redirect to STABILISE dashboard");
}

function reset(){
  localStorage.removeItem("interrupt");
  location.reload();
}

// LOAD SESSION
window.onload = () => {
  if(state.domain){
    document.getElementById("section1").classList.add("hidden");
    document.getElementById("section2").classList.remove("hidden");
    updateProgress(50);
  }

  if(state.tension){
    generateOutput();
  }

  if(state.firstMove){
    document.getElementById("outputSection").classList.remove("hidden");
    document.getElementById("finalBlock").classList.remove("hidden");
    updateProgress(100);
  }
};
</script>

</body>
</html>
