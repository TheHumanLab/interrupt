<!DOCTYPE html>
<html>
<head>
  <meta name="robots" content="noindex">
  <style>
    body{background:#0A0A0A;color:#FAFAFA;font-family:monospace;text-align:center;padding:10% 20px}
    h1{color:#DC2626;font-size:3rem;margin-bottom:40px}
  .timer{font-size:5rem;margin:40px 0}
  .dare{font-size:1.5rem;border:2px solid #DC2626;padding:24px;margin:40px auto;max-width:600px}
  .btn{background:#DC2626;color:#fff;padding:20px 40px;text-decoration:none;font-size:1.2rem;display:inline-block;margin-top:40px}
  </style>
</head>
<body>
  <h1>INTERRUPT</h1>
  <div class="timer" id="countdown">10:00</div>

  <div class="dare">
    OLD: 11:03pm → Phone → 1:22am → Self-hatred<br><br>
    NEW: 11:03pm → Phone in kitchen → 10 pushups → Sleep
  </div>

  <p>When timer hits 0:00, your phone goes in the kitchen. Now.</p>
  <p>Before you do, click once to signal commitment:</p>

  <a href="https://formspree.io/f/myklakzb" class="btn" onclick="fetch(this.href,{method:'POST',body:new FormData(Object.assign(new FormData(),{append:(k,v)=>FormData.prototype.append.call(this,k,v)},['form'].reduce((d,k)=>(d.append('product','INTERRUPT-COMMIT'),d.append('email','CUSTOMER_EMAIL'),d)))));this.textContent='COMMITTED — NOW GO';this.style.background='#16A34A';return false;">
    I COMMIT — 10 PUSHUPS NOW
  </a>

  <script>
    let time = 600; // 10 min
    const el = document.getElementById('countdown');
    const x = setInterval(() => {
      let m = Math.floor(time/60), s = time%60;
      el.textContent = `${m}:${s<10?'0':''}${s}`;
      if (--time < 0) {
        clearInterval(x);
        el.textContent = "GO. NOW.";
        document.body.style.background = "#DC2626";
      }
    }, 1000);
  </script>
</body>
</html>
